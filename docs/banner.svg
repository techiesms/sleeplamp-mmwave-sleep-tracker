<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <radialGradient id="sky" cx="50%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#10142e"/>
      <stop offset="55%" stop-color="#05060f"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c9c8ff"/>
      <stop offset="100%" stop-color="#9f9dff"/>
    </linearGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#cfcdff"/>
      <stop offset="75%" stop-color="#7d7aff"/>
      <stop offset="100%" stop-color="#4b48d6"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ce0d8"/>
      <stop offset="50%" stop-color="#7d7aff"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1.6" opacity=".8"/><circle cx="180" cy="120" r="1" opacity=".5"/>
    <circle cx="300" cy="50" r="1.3" opacity=".7"/><circle cx="430" cy="100" r="1" opacity=".5"/>
    <circle cx="520" cy="40" r="1.6" opacity=".9"/><circle cx="650" cy="80" r="1" opacity=".5"/>
    <circle cx="770" cy="55" r="1.2" opacity=".6"/><circle cx="900" cy="120" r="1" opacity=".5"/>
    <circle cx="1010" cy="50" r="1.5" opacity=".8"/><circle cx="1120" cy="95" r="1" opacity=".5"/>
    <circle cx="140" cy="300" r="1.2" opacity=".6"/><circle cx="360" cy="320" r="1" opacity=".4"/>
    <circle cx="600" cy="305" r="1.4" opacity=".7"/><circle cx="820" cy="320" r="1" opacity=".4"/>
    <circle cx="1050" cy="300" r="1.3" opacity=".6"/><circle cx="245" cy="200" r="1" opacity=".45"/>
    <circle cx="975" cy="220" r="1.1" opacity=".5"/>
  </g>

  <!-- ringed planet -->
  <g transform="translate(1050,250)" opacity=".55">
    <circle r="64" fill="url(#orb)"/>
    <ellipse rx="115" ry="26" fill="none" stroke="#adaaff" stroke-opacity=".35" stroke-width="6" transform="rotate(-16)"/>
  </g>

  <!-- score-ring motif -->
  <g transform="translate(180,180)">
    <circle r="92" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="16"/>
    <circle r="92" fill="none" stroke="url(#ring)" stroke-width="16" stroke-linecap="round"
            stroke-dasharray="462 578" transform="rotate(-90)"/>
    <circle r="66" fill="#0b0d18"/>
    <text x="0" y="14" text-anchor="middle" fill="#ffffff" font-size="46" font-weight="800">82</text>
    <text x="0" y="40" text-anchor="middle" fill="#8e93a8" font-size="12" letter-spacing="3">SLEEP SCORE</text>
  </g>

  <!-- wordmark -->
  <g transform="translate(340,150)">
    <circle cx="22" cy="-8" r="22" fill="url(#orb)"/>
    <ellipse cx="22" cy="-8" rx="37" ry="11" fill="none" stroke="#cfcdff" stroke-opacity=".6" stroke-width="2" transform="rotate(-22 22 -8)"/>
    <text x="62" y="6" fill="url(#word)" font-size="58" font-weight="800" letter-spacing="-2">SleepLamp</text>
    <text x="64" y="44" fill="#8e93a8" font-size="19" letter-spacing="1">Contactless sleep tracking with a 60&#160;GHz mmWave radar + ESP32-S3</text>
    <g transform="translate(64,76)" font-size="13" font-weight="600">
      <rect x="0" y="-16" width="150" height="26" rx="13" fill="#7d7aff" fill-opacity=".15" stroke="#7d7aff" stroke-opacity=".4"/>
      <text x="75" y="2" text-anchor="middle" fill="#c9c8ff">No wearable</text>
      <rect x="162" y="-16" width="150" height="26" rx="13" fill="#5ce0d8" fill-opacity=".12" stroke="#5ce0d8" stroke-opacity=".4"/>
      <text x="237" y="2" text-anchor="middle" fill="#9ff0ea">Heart &amp; breath</text>
      <rect x="324" y="-16" width="170" height="26" rx="13" fill="#bf5af2" fill-opacity=".12" stroke="#bf5af2" stroke-opacity=".4"/>
      <text x="409" y="2" text-anchor="middle" fill="#e3b6ff">Web dashboard</text>
    </g>
  </g>
</svg>
